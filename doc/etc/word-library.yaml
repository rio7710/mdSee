symbol_replace:
  - id: S-001
    source: '->'
    target: '§'
  - id: S-002
    source: '\u21B3'
    target: '§'
  - id: S-003
    source: '\u2192'
    target: '§'
  - id: S-004
    source: '\uFF5E'
    target: '~'

regex_replace:
  - id: R-001
    pattern: '(?<!\\S)중요\\s+함(?!\\S)'
    target: '중요함'
  - id: R-002
    pattern: '(?<!\\S)맞추어\\s+짐(?!\\S)'
    target: '맞추어짐'
  - id: R-003
    pattern: '(?<!\\S)모니터링\\s+되어야(?!\\S)'
    target: '모니터링되어야'
  - id: R-004
    pattern: '(?<!\\S)시작\\s*단계(?!\\S)'
    target: '시작 단계'
  - id: R-005
    pattern: '(?<!\\S)진행\\s*단계(?!\\S)'
    target: '진행 단계'
  - id: R-006
    pattern: '(?<!\\S)종결\\s*단계(?!\\S)'
    target: '종결 단계'
  - id: R-007
    pattern: '(?<!\\S)초기\\s*단계(?!\\S)'
    target: '초기 단계'
  - id: R-008
    pattern: '(?<!\\S)강화\\s*단계(?!\\S)'
    target: '강화 단계'
  - id: R-009
    pattern: '(?<!\\S)준비\\s*단계(?!\\S)'
    target: '준비 단계'
  - id: R-010
    pattern: '(?<!\\S)(논의|확인|수립|제공|형성|검토|발표|분석|결정|수정|경험)\\s{2,}(?!\\S)'
    target: '$1 '
  - id: R-011
    pattern: "(함|음|됨|임)\\.(?=(\\s|$|\"|'|\\)|\\]|\\}|>|,))"
    target: '$1'

ask_first:
