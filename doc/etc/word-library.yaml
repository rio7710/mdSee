owner: rio77
scope: 사회복지

policy:
  mode: strict
  apply_only_after_structure: true
  ask_when_ambiguous: true
  lecture_version_lock: true
  apply_to_whole_document: true
  record_only_if_replaced: true
  notes:
    - 띄어쓰기/결합형/문장부호 통일은 라벨 종류와 무관하게 전체 텍스트에 적용
    - 인용구(>)와 [사례]/[해설]/[질문]에도 동일 규칙 적용
    - 신규 단어는 후보목록으로 관리 후 사용자 확인을 거쳐 반영
    - 라이브러리 갱신 시 해당 렉처 전체에 재적용하고 최종 버전 1개만 유지

